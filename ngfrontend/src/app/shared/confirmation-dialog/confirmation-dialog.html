<!-- Overlay élégant -->
<div *ngIf="isOpen"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gradient-to-b from-black/40 to-black/20 backdrop-blur-[2px] transition-all"
     (click)="onCancel()">

  <!-- Modal avec design raffiné -->
  <div class="relative max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden animate-slideUp"
       (click)="$event.stopPropagation()">

    <!-- Détail décoratif doré en haut -->
    <div class="absolute top-0 left-0 right-0 h-1" style="background: linear-gradient(90deg, var(--c-gold), var(--c-green-teal), var(--c-gold));"></div>

    <!-- Contenu -->
    <div class="p-8 text-center">

      <!-- Icône avec cercle élégant -->
      <div class="relative w-20 h-20 mx-auto mb-6">
        <div class="absolute inset-0 rounded-full animate-pulse-slow" style="background-color: rgba(239, 68, 68, 0.15);"></div>
        <div class="relative w-full h-full rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-105"
             style="background: linear-gradient(135deg, #fff5f5, #fff); border: 1px solid rgba(239, 68, 68, 0.2);">
          <svg class="w-9 h-9" style="color: #ef4444;" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </div>
      </div>

      <!-- Titre -->
      <h3 class="font-dosis text-2xl font-semibold mb-2" style="color: var(--c-green-dark);">
        Supprimer le produit
      </h3>

      <!-- Ligne décorative -->
      <div class="w-12 h-0.5 mx-auto mb-4 rounded-full" style="background-color: var(--c-gold);"></div>

      <!-- Message -->
      <p class="font-poppins text-gray-500 mb-1">
        Êtes-vous sûr de vouloir supprimer le produit
      </p>


      <!-- Boutons élégants -->
      <div class="flex gap-3">
        <button (click)="onCancel()"
                class="flex-1 px-4 py-3 rounded-xl font-poppins text-sm font-medium transition-all duration-300 hover:scale-[1.02] group"
                style="border: 1.5px solid #e5e7eb; color: var(--c-gray-dark); background: white;">
          <span class="flex items-center justify-center gap-2">
            <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            Annuler
          </span>
        </button>

        <button (click)="onConfirm()"
                class="flex-1 px-4 py-3 rounded-xl font-poppins text-sm font-medium transition-all duration-300 hover:scale-[1.02] hover:shadow-lg group"
                style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white;">
          <span class="flex items-center justify-center gap-2">
            <svg class="w-4 h-4 transition-transform group-hover:translate-x-0.5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
            Supprimer
          </span>
        </button>
      </div>
    </div>

    <!-- Petite note discrète -->
    <div class="px-8 pb-6 text-center">
      <p class="font-poppins text-xs text-gray-400">
        Cette action est irréversible
      </p>
    </div>
  </div>
</div>
